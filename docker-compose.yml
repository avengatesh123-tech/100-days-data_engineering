version: '3.8'

services:

  # ─── Zookeeper (Kafka needs this) ───
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ─── Kafka ───
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ─── Kafka UI (browser la kafka monitor pannalam) ───
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── Spark Master ───
  spark-master:
    image: bitnamilegacy/spark:3.4.1
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./consumer:/app/consumer
      - ./batch:/app/batch
      - ./delta_tables:/app/delta_tables
      - ./checkpoints:/app/checkpoints
      - ./late_data:/app/late_data

  # ─── Spark Worker ───
  spark-worker:
    image: bitnamilegacy/spark:3.4.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./consumer:/app/consumer
      - ./batch:/app/batch
      - ./delta_tables:/app/delta_tables
      - ./checkpoints:/app/checkpoints

  # ─── Producer (Python) ───
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: order-producer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./producer:/app
      - ./late_data:/app/late_data
    restart: unless-stopped

  # ─── Airflow ───
  airflow:
    image: apache/airflow:2.7.0
    container_name: airflow
    depends_on:
      - kafka
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./batch:/opt/airflow/batch
      - ./delta_tables:/opt/airflow/delta_tables
      - ./late_data:/opt/airflow/late_data
    command: standalone

  # ─── Dashboard (Streamlit) ───
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: etl-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./delta_tables:/app/delta_tables
    restart: unless-stopped

networks:
  default:
    name: etl-network
